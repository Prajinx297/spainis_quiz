<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spanish MCQ — Learn & Test</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a23;
    --card: #1e2330;
    --border: #2a3045;
    --gold: #f5c842;
    --gold-dim: #c9a02e;
    --green: #4ade80;
    --green-bg: #052010;
    --red: #f87171;
    --red-bg: #200505;
    --text: #e8eaf0;
    --muted: #7a8099;
    --accent: #6c8fff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Sora',sans-serif; min-height:100vh; }

  /* ── TOP NAV ── */
  header {
    background:var(--surface);
    border-bottom:1px solid var(--border);
    padding:16px 24px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:100;
  }
  .logo { font-size:1.3rem; font-weight:800; color:var(--gold); letter-spacing:-0.5px; }
  .logo span { color:var(--text); }
  .mode-tabs { display:flex; gap:8px; }
  .mode-tab {
    padding:8px 20px; border-radius:999px; border:1.5px solid var(--border);
    background:transparent; color:var(--muted); font-family:'Sora',sans-serif;
    font-size:.85rem; font-weight:600; cursor:pointer; transition:all .2s;
  }
  .mode-tab.active { background:var(--gold); color:#000; border-color:var(--gold); }
  .mode-tab:hover:not(.active) { border-color:var(--gold); color:var(--gold); }

  /* ── SECTION PILLS ── */
  .section-bar {
    padding:16px 24px;
    display:flex; flex-wrap:wrap; gap:8px;
    border-bottom:1px solid var(--border);
    background:var(--bg);
    position:sticky; top:65px; z-index:99;
  }
  .sec-pill {
    padding:6px 16px; border-radius:999px;
    border:1.5px solid var(--border); background:transparent;
    color:var(--muted); font-family:'Sora',sans-serif; font-size:.78rem; font-weight:600;
    cursor:pointer; transition:all .2s;
  }
  .sec-pill.active { background:var(--gold); color:#000; border-color:var(--gold); }
  .sec-pill:hover:not(.active) { border-color:var(--gold-dim); color:var(--gold); }

  /* ── MAIN ── */
  main { max-width:820px; margin:0 auto; padding:32px 24px; }

  /* ── PROGRESS BAR ── */
  .progress-wrap { margin-bottom:28px; }
  .progress-top { display:flex; justify-content:space-between; margin-bottom:8px; font-size:.8rem; color:var(--muted); }
  .progress-bar { height:4px; background:var(--border); border-radius:4px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--gold); border-radius:4px; transition:width .4s; }

  /* ── QUESTION CARD ── */
  .q-card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:28px 32px;
    margin-bottom:20px;
    animation:fadeUp .35s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

  .q-meta {
    display:flex; align-items:center; gap:10px; margin-bottom:14px;
  }
  .q-num {
    font-family:'JetBrains Mono',monospace; font-size:.78rem; font-weight:600;
    color:var(--gold); background:#1a1500; border:1px solid #3a2e00;
    padding:3px 10px; border-radius:6px;
  }
  .q-section {
    font-size:.75rem; color:var(--muted); background:var(--surface);
    border:1px solid var(--border); padding:3px 10px; border-radius:6px;
  }

  .q-text { font-size:1.05rem; font-weight:600; line-height:1.6; margin-bottom:20px; }

  /* ── OPTIONS ── */
  .options { display:flex; flex-direction:column; gap:10px; }
  .option {
    display:flex; align-items:flex-start; gap:14px;
    padding:14px 18px; border-radius:12px;
    border:1.5px solid var(--border); background:var(--surface);
    cursor:pointer; transition:all .18s; position:relative;
  }
  .option:hover { border-color:var(--accent); background:#1a2035; }
  .option.correct { border-color:var(--green) !important; background:var(--green-bg) !important; }
  .option.wrong   { border-color:var(--red)   !important; background:var(--red-bg)   !important; }

  /* LEARN MODE: correct always shown */
  .option.learn-correct { border-color:var(--green); background:var(--green-bg); }

  .opt-letter {
    font-family:'JetBrains Mono',monospace; font-weight:600; font-size:.85rem;
    min-width:24px; height:24px; display:flex; align-items:center; justify-content:center;
    border-radius:6px; background:var(--border); color:var(--muted);
    flex-shrink:0; margin-top:1px;
  }
  .option.learn-correct .opt-letter, .option.correct .opt-letter { background:var(--green); color:#000; }
  .option.wrong .opt-letter { background:var(--red); color:#000; }
  .opt-text { font-size:.92rem; line-height:1.5; }

  /* ── EXPLANATION ── */
  .explanation {
    margin-top:16px; padding:14px 18px;
    background:#0a1220; border:1px solid #1a3050; border-radius:10px;
    font-size:.88rem; line-height:1.6; color:#a0c4e8;
  }
  .explanation strong { color:var(--gold); }

  /* ── TEST NAV BUTTONS ── */
  .q-nav { display:flex; gap:12px; margin-top:20px; align-items:center; }
  .btn {
    padding:10px 24px; border-radius:10px; border:none;
    font-family:'Sora',sans-serif; font-weight:700; font-size:.88rem;
    cursor:pointer; transition:all .18s;
  }
  .btn-primary { background:var(--gold); color:#000; }
  .btn-primary:hover { background:var(--gold-dim); }
  .btn-secondary { background:var(--surface); color:var(--text); border:1.5px solid var(--border); }
  .btn-secondary:hover { border-color:var(--gold); color:var(--gold); }
  .btn:disabled { opacity:.4; cursor:not-allowed; }

  /* ── SCORE PANEL ── */
  .score-panel {
    text-align:center; padding:60px 20px;
  }
  .score-big { font-size:5rem; font-weight:800; color:var(--gold); line-height:1; }
  .score-label { font-size:1.1rem; color:var(--muted); margin-top:8px; margin-bottom:32px; }
  .score-breakdown { display:flex; justify-content:center; gap:40px; margin-bottom:40px; }
  .sb-item { text-align:center; }
  .sb-num { font-size:2rem; font-weight:800; }
  .sb-num.correct { color:var(--green); }
  .sb-num.wrong { color:var(--red); }
  .sb-desc { font-size:.8rem; color:var(--muted); margin-top:4px; }

  /* ── EMPTY STATE ── */
  .empty { text-align:center; padding:80px 20px; color:var(--muted); }
  .empty-icon { font-size:3rem; margin-bottom:16px; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

  @media(max-width:600px){
    header { flex-direction:column; gap:12px; }
    .q-card { padding:20px 18px; }
  }
</style>
</head>
<body>

  <div class="logo">🇪🇸 Español<span>MCQ</span></div>

  </div>
</header>

<div class="section-bar" id="sectionBar"></div>

<main id="mainContent"></main>

// ──────────────────────────────────────────────
function getQuestions() {
  if (activeSection === "All") return [...RAW];
  return RAW.filter(q => q.s === activeSection);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ──────────────────────────────────────────────
// RENDER SECTION BAR
// ──────────────────────────────────────────────
function renderSectionBar() {
  const bar = document.getElementById("sectionBar");
  bar.innerHTML = SECTIONS.map(s =>
    `<button class="sec-pill ${s === activeSection ? "active" : ""}" onclick="setSection('${s}')">${s}</button>`
  ).join("");
}

// ──────────────────────────────────────────────
// LEARN MODE
// ──────────────────────────────────────────────
function renderLearn() {
  const qs = getQuestions();
  const main = document.getElementById("mainContent");
  if (!qs.length) { main.innerHTML = `<div class="empty"><div class="empty-icon">📭</div>No questions found.</div>`; return; }

  const progress = `<div class="progress-wrap">
    <div class="progress-top"><span>${qs.length} questions</span><span>${activeSection}</span></div>
  </div>`;

  const cards = qs.map(q => {
    const correctIdx = LETTERS.indexOf(q.a);
    const opts = q.opts.map((opt, i) => `
      <div class="option ${i === correctIdx ? "learn-correct" : ""}">
        <span class="opt-letter">${LETTERS[i]}</span>
        <span class="opt-text">${opt}</span>
      </div>`).join("");
    return `<div class="q-card">
      <div class="q-meta">
        <span class="q-num">Q${q.n}</span>
        <span class="q-section">${q.s}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options">${opts}</div>
      <div class="explanation"><strong>✅ Explanation:</strong> ${q.e}</div>
    </div>`;
  }).join("");

  main.innerHTML = progress + cards;
}

// ──────────────────────────────────────────────
// TEST MODE
// ──────────────────────────────────────────────
function initTest() {
  const qs = shuffle(getQuestions());
  testState = {
    questions: qs,
    current: 0,
    answers: new Array(qs.length).fill(null),
    shuffledOpts: qs.map(q => {
      const indices = shuffle([0,1,2,3]);
      return { indices, opts: indices.map(i => q.opts[i]) };
    }),
    submitted: false,
    showScore: false
  };
}

function renderTest() {
  const main = document.getElementById("mainContent");
  if (!testState) { initTest(); }
  if (testState.showScore) { renderScore(); return; }

  const {questions, current, answers, shuffledOpts} = testState;
  const q = questions[current];
  const so = shuffledOpts[current];
  const total = questions.length;
  const pct = ((current) / total * 100).toFixed(1);

  const progress = `<div class="progress-wrap">
    <div class="progress-top"><span>Question ${current+1} of ${total}</span><span>${activeSection}</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>`;

  const answered = answers[current];
  const correctOrigIdx = LETTERS.indexOf(q.a);

  const opts = so.opts.map((opt, si) => {
    const origIdx = so.indices[si];
    let cls = "";
    if (answered !== null) {
      if (origIdx === correctOrigIdx) cls = "correct";
      else if (si === answered) cls = "wrong";
    }
    return `<div class="option ${cls}" ${answered === null ? `onclick="selectOpt(${si})"` : ""}>
      <span class="opt-letter">${LETTERS[si]}</span>
      <span class="opt-text">${opt}</span>
    </div>`;
  }).join("");

  const explanation = answered !== null
    ? `<div class="explanation"><strong>✅ Explanation:</strong> ${q.e}</div>` : "";

  const navButtons = `<div class="q-nav">
    <button class="btn btn-secondary" onclick="navQ(-1)" ${current===0?"disabled":""}>← Prev</button>
    <button class="btn btn-secondary" onclick="navQ(1)" ${current===total-1?"disabled":""}>Next →</button>
    ${current===total-1 ? `<button class="btn btn-primary" onclick="showScore()">See Results 🎉</button>` : ""}
  </div>`;

  main.innerHTML = progress + `<div class="q-card">
    <div class="q-meta">
      <span class="q-num">Q${q.n}</span>
      <span class="q-section">${q.s}</span>
    </div>
    <div class="q-text">${q.q}</div>
    <div class="options">${opts}</div>
    ${explanation}
    ${navButtons}
  </div>`;
}

function selectOpt(si) {
  if (testState.answers[testState.current] !== null) return;
  testState.answers[testState.current] = si;
  renderTest();
}

function navQ(dir) {
  testState.current = Math.max(0, Math.min(testState.questions.length - 1, testState.current + dir));
  renderTest();
}

function showScore() {
  testState.showScore = true;
  renderScore();
}

function renderScore() {
  const {questions, answers, shuffledOpts} = testState;
  let correct = 0;
  questions.forEach((q, i) => {
    const correctOrigIdx = LETTERS.indexOf(q.a);
    if (answers[i] !== null && shuffledOpts[i].indices[answers[i]] === correctOrigIdx) correct++;
  });
  const total = questions.length;
  const wrong = answers.filter(a => a !== null).length - correct;
  const skipped = answers.filter(a => a === null).length;
  const pct = Math.round(correct / total * 100);

  document.getElementById("mainContent").innerHTML = `
    <div class="score-panel">
      <div class="score-big">${pct}%</div>
      <div class="score-label">Your Score — ${correct} of ${total} correct</div>
      <div class="score-breakdown">
        <div class="sb-item"><div class="sb-num correct">${correct}</div><div class="sb-desc">Correct</div></div>
        <div class="sb-item"><div class="sb-num wrong">${wrong}</div><div class="sb-desc">Wrong</div></div>
        <div class="sb-item"><div class="sb-num" style="color:var(--muted)">${skipped}</div><div class="sb-desc">Skipped</div></div>
      </div>
      <button class="btn btn-primary" style="margin-right:12px" onclick="retryTest()">🔄 Retry Test</button>
      <button class="btn btn-secondary" onclick="reviewTest()">📋 Review Answers</button>
    </div>`;
}

function retryTest() {
  initTest();
  renderTest();
}

function reviewTest() {
  testState.showScore = false;
  testState.current = 0;
  renderTest();
}

// ──────────────────────────────────────────────
// CONTROLLERS
// ──────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.querySelectorAll(".mode-tab").forEach((t,i) => t.classList.toggle("active", ["learn","test"][i] === m));
  if (m === "test") { testState = null; initTest(); renderTest(); }
  else renderLearn();
}

function setSection(s) {
  activeSection = s;
  renderSectionBar();
  if (mode === "test") { testState = null; initTest(); renderTest(); }
  else renderLearn();
}

// ──────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────
renderSectionBar();
renderLearn();
</script>
</body>
</html>
